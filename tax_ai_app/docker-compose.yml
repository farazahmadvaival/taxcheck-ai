services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: rq worker tax_jobs --url redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tax_ai
      POSTGRES_USER: tax_ai
      POSTGRES_PASSWORD: tax_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
