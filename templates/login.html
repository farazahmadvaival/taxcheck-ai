{% extends "base.html" %}

{% block title %}Login - TaxCheck Platform{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md bg-card text-card-foreground border border-border p-8 rounded-2xl shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold tracking-tight text-foreground">Sign In</h1>
            <p class="text-sm text-muted-foreground">Enter credentials to access your firm dashboard</p>
        </div>

        {% if error %}
        <div class="p-3 rounded-lg border border-destructive/20 bg-destructive/10 text-xs text-destructive flex items-center space-x-2">
            <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/login" method="post" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-1.5">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="preparer@taxcheck.com" 
                       class="w-full px-4 py-3 rounded-lg border border-border bg-muted/20 text-foreground placeholder-muted-foreground focus:outline-none focus:border-primary transition-colors text-sm">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-1.5">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" 
                       class="w-full px-4 py-3 rounded-lg border border-border bg-muted/20 text-foreground placeholder-muted-foreground focus:outline-none focus:border-primary transition-colors text-sm">
            </div>

            <button type="submit" 
                    class="w-full py-3 px-4 rounded-lg bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-slate-950 font-bold transition-all transform hover:-translate-y-0.5 shadow-lg shadow-teal-500/20 text-sm">
                Sign In
            </button>
        </form>

        <div class="border-t border-border pt-4 text-center">
            <div class="inline-block p-3 rounded-lg border border-border bg-muted/20 text-[11px] text-muted-foreground text-left w-full">
                <span class="font-bold text-foreground block mb-1">Demo Credentials:</span>
                <span class="block">Email: <code class="text-primary font-mono font-semibold">preparer@taxcheck.com</code></span>
                <span class="block">Password: <code class="text-primary font-mono font-semibold">password123</code></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
